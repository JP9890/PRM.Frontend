<div class="container mt-5" style="max-width: 500px;">
  <div class="card shadow-sm">
    <div class="card-header bg-danger text-white">
      <h4 class="mb-0">Change Password</h4>
    </div>
    <div class="card-body">
      <p class="text-muted" *ngIf="isFirstLogin">
        You must set a new password before you can continue.
      </p>
      <p class="text-muted" *ngIf="!isFirstLogin">
        Enter your current password and choose a new one.
      </p>

      <form [formGroup]="changePasswordForm" (ngSubmit)="onSubmit()">
        <div class="form-group mb-3" *ngIf="!isFirstLogin">
        <label for="oldPassword">Current Password</label>
        <div class="input-group">
          <input [type]="showOldPassword ? 'text' : 'password'" id="oldPassword" class="form-control" formControlName="oldPassword" 
            [ngClass]="{ 'is-invalid': changePasswordForm.get('oldPassword')?.invalid && changePasswordForm.get('oldPassword')?.touched }" />
          <button class="btn btn-outline-secondary" type="button" (click)="toggleOldPasswordVisibility()">
            <i class="bi" [ngClass]="showOldPassword ? 'bi-eye-slash' : 'bi-eye'"></i> {{ showOldPassword ? 'Hide' : 'Show' }}
          </button>
          <div class="invalid-feedback">Current password is required.</div>
        </div>
      </div>

      <div class="form-group mb-3">
        <label for="newPassword">New Password</label>
        <div class="input-group">
          <input [type]="showNewPassword ? 'text' : 'password'" id="newPassword" class="form-control" formControlName="newPassword" 
            [ngClass]="{ 'is-invalid': changePasswordForm.get('newPassword')?.invalid && changePasswordForm.get('newPassword')?.touched }" />
          <button class="btn btn-outline-secondary" type="button" (click)="toggleNewPasswordVisibility()">
            <i class="bi" [ngClass]="showNewPassword ? 'bi-eye-slash' : 'bi-eye'"></i> {{ showNewPassword ? 'Hide' : 'Show' }}
          </button>
          <div class="invalid-feedback" *ngIf="changePasswordForm.get('newPassword')?.errors?.['required']">New password is required.</div>
          <div class="invalid-feedback" *ngIf="changePasswordForm.get('newPassword')?.errors?.['minlength']">Password must be at least 8 characters.</div>
        </div>
      </div>

      <div class="form-group mb-4">
        <label for="confirmPassword">Confirm Password</label>
        <div class="input-group">
          <input [type]="showConfirmPassword ? 'text' : 'password'" id="confirmPassword" class="form-control" formControlName="confirmPassword" 
            [ngClass]="{ 'is-invalid': changePasswordForm.get('confirmPassword')?.invalid && changePasswordForm.get('confirmPassword')?.touched }" />
          <button class="btn btn-outline-secondary" type="button" (click)="toggleConfirmPasswordVisibility()">
            <i class="bi" [ngClass]="showConfirmPassword ? 'bi-eye-slash' : 'bi-eye'"></i> {{ showConfirmPassword ? 'Hide' : 'Show' }}
          </button>
          <div class="invalid-feedback">Please confirm your password.</div>
        </div>
      </div>

        <button type="submit" class="btn btn-primary w-100" [disabled]="isLoading">
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-1"></span> Save and Continue
        </button>
      </form>
    </div>
  </div>
</div>
