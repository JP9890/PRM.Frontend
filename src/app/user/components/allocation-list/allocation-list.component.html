<div class="container mt-4">
  <div class="mb-3">
    <a routerLink="/admin" class="text-decoration-none small">&larr; Back to Admin Panel</a>
    <h2 class="mt-1 mb-0">All Allocations</h2>
  </div>

  <div class="row mb-3 g-2">
    <div class="col-md-3">
      <input type="number" class="form-control" placeholder="Filter by Employee ID" [(ngModel)]="filterEmployeeId" />
    </div>
    <div class="col-md-3">
      <input type="number" class="form-control" placeholder="Filter by Project ID" [(ngModel)]="filterProjectId" />
    </div>
    <div class="col-md-2">
      <button class="btn btn-secondary w-100" (click)="loadAllocations()">Filter</button>
    </div>
  </div>

  <div *ngIf="isLoading" class="text-center py-4"><div class="spinner-border text-primary"></div></div>

  <div class="alert alert-info" *ngIf="!isLoading">Total Active Allocations: {{ allocations.length }}</div>

  <table class="table table-striped table-hover" *ngIf="!isLoading">
    <thead>
      <tr>
        <th>Employee</th>
        <th>Project</th>
        <th>%</th>
        <th>From</th>
        <th>To</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let a of allocations">
        <td>{{ a.employeeName }}</td>
        <td>{{ a.projectName }}</td>
        <td>{{ a.utilizationPercent }}%</td>
        <td>{{ a.fromDate }}</td>
        <td>{{ a.toDate }}</td>
      </tr>
      <tr *ngIf="allocations.length === 0"><td colspan="5" class="text-center">No active allocations.</td></tr>
    </tbody>
  </table>
</div>
