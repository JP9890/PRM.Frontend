<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <a routerLink="/user" class="text-decoration-none small">&larr; Back to Admin Panel</a>
      <h2 class="mt-1 mb-0">Manage Employees</h2>
    </div>
    <div>
      <button class="btn btn-outline-primary me-2" routerLink="/user/employees/assign-manager">Assign Manager</button>
    </div>
  </div>

  <div class="row mb-3 g-2">
    <div class="col-md-3">
      <select class="form-select" [(ngModel)]="filterStatus" (change)="loadEmployees()">
        <option value="">All Statuses</option>
        <option value="BENCH">BENCH</option>
        <option value="ALLOCATED">ALLOCATED</option>
      </select>
    </div>
    <div class="col-md-3">
      <input type="text" class="form-control" placeholder="Filter by department" [(ngModel)]="filterDepartment" (keyup.enter)="loadEmployees()" />
    </div>
    <div class="col-md-2">
      <button class="btn btn-secondary w-100" (click)="loadEmployees()">Filter</button>
    </div>
  </div>

  <div *ngIf="isLoading" class="text-center py-4"><div class="spinner-border text-primary"></div></div>

  <div class="alert alert-info" *ngIf="!isLoading">
    Total: {{ employees.length }} | Allocated: {{ allocatedCount }} | Bench: {{ benchCount }}
  </div>

  <table class="table table-striped table-hover" *ngIf="!isLoading">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Department</th>
        <th>Status</th>
        <th>Utilization</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let emp of employees">
        <td>{{ emp.id }}</td>
        <td>{{ emp.fullName }}</td>
        <td>{{ emp.department }}</td>
        <td>
          <span class="badge" [ngClass]="emp.status === 'BENCH' ? 'bg-warning text-dark' : 'bg-info'">{{ emp.status }}</span>
        </td>
        <td>{{ emp.totalUtilization }}%</td>
        <td>
          <button class="btn btn-sm btn-outline-primary" [routerLink]="['/user/employees/edit', emp.id]">Manage</button>
        </td>
      </tr>
      <tr *ngIf="employees.length === 0"><td colspan="6" class="text-center">No employees found.</td></tr>
    </tbody>
  </table>
</div>
