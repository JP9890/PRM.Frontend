<div class="container mt-4" style="max-width: 600px;">
  <a routerLink="/user/users" class="text-decoration-none small">&larr; Back to Users</a>
  <div class="card shadow-sm mt-2">
    <div class="card-header bg-primary text-white">
      <h4 class="mb-0">Create User Account</h4>
    </div>
    <div class="card-body">
      <form [formGroup]="createForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" formControlName="fullName" />
          <div *ngIf="createForm.get('fullName')?.touched && createForm.get('fullName')?.invalid" class="text-danger small mt-1">
            Full name is required.
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" formControlName="username" />
          <div *ngIf="createForm.get('username')?.touched && createForm.get('username')?.invalid" class="text-danger small mt-1">
            Username is required.
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" formControlName="email" />
        </div>

        <div class="mb-3">
          <label class="form-label">Temporary Password</label>
          <input type="password" class="form-control" formControlName="password" />
          <small class="text-muted">Min 8 chars, one uppercase, one number.</small>
        </div>

        <div class="mb-3">
          <label class="form-label">Role</label>
          <select class="form-select" formControlName="roleId">
            <option value="" disabled>Select a role...</option>
            <option *ngFor="let role of availableRoles" [value]="role.id">{{ role.name }}</option>
          </select>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-4">
          <button type="button" class="btn btn-secondary" routerLink="/user/users">Cancel</button>
          <button type="submit" class="btn btn-primary" [disabled]="isLoading">
            <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-1"></span> Create User
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
