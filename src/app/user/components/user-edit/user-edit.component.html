<div class="container mt-4" style="max-width: 600px;">
  <a routerLink="/user/users" class="text-decoration-none small">&larr; Back to Users</a>
  <div class="card shadow-sm mt-2">
    <div class="card-header bg-primary text-white">
      <h4 class="mb-0">Edit User</h4>
    </div>
    <div class="card-body">
      <div *ngIf="isLoading" class="text-center py-3">
        <div class="spinner-border text-primary"></div>
      </div>
      <form [formGroup]="editForm" (ngSubmit)="onSubmit()" *ngIf="!isLoading">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" formControlName="fullName" />
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" formControlName="email" />
        </div>
        <div class="mb-3">
          <label class="form-label">Role</label>
          <select class="form-select" formControlName="roleId">
            <option *ngFor="let role of availableRoles" [value]="role.id">{{ role.name }}</option>
          </select>
        </div>
        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" formControlName="isActive" id="isActive" />
          <label class="form-check-label" for="isActive">Active</label>
        </div>
        <div class="d-flex justify-content-end gap-2">
          <button type="button" class="btn btn-secondary" routerLink="/user/users">Cancel</button>
          <button type="submit" class="btn btn-primary" [disabled]="isSaving">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>
